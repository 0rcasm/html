<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>HTML 미리보기</title>

  <style>
    body { margin: 0; font-family: sans-serif; }

    .topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 40px;
      background: #111;
      color: white;
      display: flex;
      align-items: center;
      padding: 0 10px;
      font-size: 14px;
      z-index: 10;
      gap: 8px;
    }

    .container {
      display: flex;
      height: calc(100vh - 40px);
      margin-top: 40px;
    }

    textarea {
      width: 50%;
      padding: 12px;
      border: none;
      resize: none;
      font-family: monospace;
      font-size: 14px;
      outline: none;
      border-right: 1px solid #ccc;
    }

    iframe {
      width: 50%;
      border: none;
      background: white;
    }

    button {
      padding: 4px 10px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="topbar">
  HTML 미리보기
  <button onclick="update()">새로고침</button>
  <button onclick="loadTemplate()">기본 템플릿</button>
  <button onclick="clearCode()">초기화</button>
  <button onclick="downloadHTML()">HTML 저장</button>
  <button onclick="downloadImage()">이미지 저장</button>
  <button onclick="downloadPDF()">PDF 저장</button>
</div>

<div class="container">
  <textarea id="editor"></textarea>
  <iframe id="preview"></iframe>
</div>

<!-- 라이브러리 -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>
  const editor = document.getElementById("editor");
  const preview = document.getElementById("preview");

  // 저장된 코드 불러오기
  editor.value = localStorage.getItem("code") || `<h1>Hello</h1>\n<p>여기에 HTML 붙여넣기</p>`;

  function update() {
    preview.srcdoc = editor.value;
  }

  // 자동 저장 + 미리보기
  let timeout;
  editor.addEventListener("input", () => {
    localStorage.setItem("code", editor.value);

    clearTimeout(timeout);
    timeout = setTimeout(update, 300);
  });

  // 기본 템플릿
  function loadTemplate() {
    const template = `<!DOCTYPE html>
<html>
<head>
  <title>문서</title>
</head>
<body>

<h1>제목</h1>
<p>내용 작성</p>

</body>
</html>`;

    editor.value = template;
    localStorage.setItem("code", template);
    update();
  }

  // 초기화
  function clearCode() {
    if (confirm("내용을 초기화할까?")) {
      editor.value = "";
      localStorage.removeItem("code");
      update();
    }
  }

  // 🔥 HTML 저장
  function downloadHTML() {
    const blob = new Blob([editor.value], { type: "text/html" });
    const link = document.createElement("a");
    link.download = "document.html";
    link.href = URL.createObjectURL(blob);
    link.click();
  }

  // 🔥 이미지 저장
  function downloadImage() {
    const iframe = document.getElementById("preview");

    html2canvas(iframe.contentDocument.body).then(canvas => {
      const link = document.createElement("a");
      link.download = "preview.png";
      link.href = canvas.toDataURL();
      link.click();
    });
  }

  // 🔥 PDF 저장
  async function downloadPDF() {
    const iframe = document.getElementById("preview");

    const canvas = await html2canvas(iframe.contentDocument.body);
    const imgData = canvas.toDataURL("image/png");

    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF();

    const imgWidth = 190;
    const imgHeight = (canvas.height * imgWidth) / canvas.width;

    pdf.addImage(imgData, "PNG", 10, 10, imgWidth, imgHeight);
    pdf.save("preview.pdf");
  }

  update();
</script>

</body>
</html>

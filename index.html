<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>HTML 미리보기</title>

  <style>
    body {
      margin: 0;
      font-family: sans-serif;
    }

    .topbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 40px;
      background: #111;
      color: white;
      display: flex;
      align-items: center;
      padding: 0 10px;
      font-size: 14px;
      z-index: 10;
    }

    .container {
      display: flex;
      height: calc(100vh - 40px);
      margin-top: 40px;
    }

    textarea {
      width: 50%;
      padding: 12px;
      border: none;
      resize: none;
      font-family: monospace;
      font-size: 14px;
      outline: none;
      border-right: 1px solid #ccc;
    }

    iframe {
      width: 50%;
      border: none;
    }

    button {
      margin-left: 10px;
      padding: 4px 10px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="topbar">
  HTML 미리보기
  <button onclick="update()">새로고침</button>
  <button onclick="loadTemplate()">기본 템플릿</button>
  <button onclick="clearCode()">초기화</button>
</div>

<div class="container">
  <textarea id="editor"></textarea>
  <iframe id="preview"></iframe>
</div>

<script>
  const editor = document.getElementById("editor");
  const preview = document.getElementById("preview");

  // 🔥 저장된 코드 불러오기
  editor.value = localStorage.getItem("code") || `<h1>Hello</h1>\n<p>여기에 HTML 붙여넣기</p>`;

  function update() {
    preview.srcdoc = editor.value;
  }

  // 🔥 자동 저장 + 미리보기 (딜레이)
  let timeout;
  editor.addEventListener("input", () => {
    localStorage.setItem("code", editor.value);

    clearTimeout(timeout);
    timeout = setTimeout(update, 300);
  });

  // 🔹 기본 템플릿
  function loadTemplate() {
    const template = `<!DOCTYPE html>
<html>
<head>
  <title>문서</title>
</head>
<body>

<h1>제목</h1>
<p>내용 작성</p>

</body>
</html>`;

    editor.value = template;
    localStorage.setItem("code", template);
    update();
  }

  // 🔹 초기화
  function clearCode() {
    if (confirm("내용을 초기화할까?")) {
      editor.value = "";
      localStorage.removeItem("code");
      update();
    }
  }

  // 최초 실행
  update();
</script>

</body>
</html>
